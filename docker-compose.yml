version: "3.9"

services:
  bot:
    build: .
    container_name: tgbot_autoposter
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./logs:/app/logs

  postgres:
    image: postgres:16-alpine
    container_name: tgbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tgbot_autoposter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tgbot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
